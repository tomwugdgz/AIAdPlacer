<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMN 品牌智能增长系统 v1.0</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --primary: #2B6CB2;
    --primary-light: #409EFF;
    --success: #67C23A;
    --warning: #E6A23C;
    --danger: #F56C6C;
    --info: #909399;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --text: #303133;
    --text-secondary: #606266;
    --border: #DCDFE6;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body { font-family:'Microsoft YaHei','Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
  
  /* 顶部导航 */
  .topbar { background:linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color:#fff; padding:0 24px; height:56px; display:flex; align-items:center; box-shadow:0 2px 8px rgba(43,108,178,0.3); position:sticky; top:0; z-index:100; }
  .topbar .logo { font-size:20px; font-weight:700; margin-right:32px; letter-spacing:1px; }
  .topbar .nav { display:flex; gap:0; height:100%; }
  .topbar .nav-item { display:flex; align-items:center; padding:0 20px; cursor:pointer; font-size:14px; border-bottom:3px solid transparent; transition:all 0.3s; }
  .topbar .nav-item:hover { background:rgba(255,255,255,0.1); }
  .topbar .nav-item.active { border-bottom-color:#fff; background:rgba(255,255,255,0.15); font-weight:600; }
  
  /* 主容器 */
  .page { max-width:1200px; margin:0 auto; padding:24px; }
  
  /* 卡片 */
  .card { background:var(--card); border-radius:12px; padding:24px; margin-bottom:20px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .card-title { font-size:18px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
  .card-title .icon { font-size:24px; }
  
  /* 按钮 */
  .btn { padding:10px 24px; border:none; border-radius:6px; font-size:14px; cursor:pointer; transition:all 0.3s; font-weight:500; display:inline-flex; align-items:center; gap:6px; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-primary:hover { background:var(--primary-light); transform:translateY(-1px); box-shadow:0 4px 12px rgba(43,108,178,0.4); }
  .btn-success { background:var(--success); color:#fff; }
  .btn-success:hover { background:#5daf34; }
  .btn-warning { background:var(--warning); color:#fff; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none !important; }
  
  /* 表单 */
  .form-group { margin-bottom:20px; }
  .form-label { display:block; font-size:14px; font-weight:500; color:var(--text-secondary); margin-bottom:8px; }
  .form-input, .form-textarea, .form-select { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:6px; font-size:14px; color:var(--text); transition:all 0.3s; font-family:inherit; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(43,108,178,0.1); }
  .form-textarea { min-height:100px; resize:vertical; }
  
  /* 标签 */
  .tag { display:inline-block; background:#ECF5FF; color:var(--primary); border-radius:4px; padding:4px 12px; font-size:12px; margin:4px; border:1px solid #D9ECFF; }
  .tag-success { background:#F0F9EB; color:var(--success); border-color:#E1F3D8; }
  .tag-warning { background:#FDF6EC; color:var(--warning); border-color:#FAECD8; }
  
  /* 表格 */
  .table { width:100%; border-collapse:collapse; font-size:14px; }
  .table th { text-align:left; padding:12px 16px; background:var(--bg); color:var(--text-secondary); font-weight:600; border-bottom:2px solid var(--border); }
  .table td { padding:12px 16px; border-bottom:1px solid var(--border); }
  .table tr:hover { background:#FAFAFA; }
  
  /* 状态 */
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .status-ok { background:var(--success); }
  .status-err { background:var(--danger); }
  .status-warn { background:var(--warning); }
  
  /* 加载动画 */
  .loading { display:none; text-align:center; padding:40px; color:var(--text-secondary); }
  .loading.show { display:block; }
  .spinner { border:3px solid var(--border); border-top:3px solid var(--primary); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto 16px; }
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  
  /* 结果展示 */
  .result-box { background:var(--bg); border-radius:8px; padding:20px; margin-top:20px; max-height:60vh; overflow:auto; }
  .result-title { font-size:16px; font-weight:600; margin-bottom:12px; color:var(--primary); }
  .result-content { font-size:14px; line-height:1.8; white-space:pre-wrap; word-break:break-all; }
  
  /* 提示信息 */
  .alert { padding:12px 20px; border-radius:6px; margin-bottom:16px; font-size:14px; display:flex; align-items:center; gap:8px; }
  .alert-success { background:#F0F9EB; color:var(--success); border:1px solid #E1F3D8; }
  .alert-warning { background:#FDF6EC; color:var(--warning); border:1px solid #FAECD8; }
  .alert-danger { background:#FEF0F0; color:var(--danger); border:1px solid #FDE2E2; }
  
  /* 网格布局 */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
  
  /* 响应式 */
  @media (max-width:768px) {
    .grid-2, .grid-3 { grid-template-columns:1fr; }
    .page { padding:16px; }
    .topbar .logo { font-size:16px; }
  }
  
  /* 滚动条 */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text-secondary); }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="logo">🎯 BMN 品牌智能增长系统</div>
  <div class="nav">
    <div class="nav-item active" onclick="switchPage('brand')">🏢 品牌引擎</div>
    <div class="nav-item" onclick="switchPage('assets')">📦 资产金库</div>
    <div class="nav-item" onclick="switchPage('workflow')">⚙️ 工作流</div>
  </div>
</div>

<!-- 品牌引擎页面 -->
<div class="page" id="page-brand">
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span class="icon">🏢</span> 品牌引擎 L1</div>
    </div>
    
    <div class="alert alert-success">
      ✅ 品牌引擎已加载，输入品牌名称即可获取完整品牌配置
    </div>
    
    <div class="form-group">
      <label class="form-label">品牌名称</label>
      <input class="form-input" id="brand-name" type="text" placeholder="输入品牌名称，如：XX传媒" value="XX传媒" />
    </div>
    
    <button class="btn btn-primary" onclick="loadBrandConfig()">🔍 获取品牌配置</button>
    
    <div class="loading" id="brand-loading">
      <div class="spinner"></div>
      <div>正在加载品牌配置...</div>
    </div>
    
    <div class="result-box" id="brand-result" style="display:none;">
      <div class="result-title">📋 品牌配置详情</div>
      <div id="brand-content"></div>
    </div>
  </div>
</div>

<!-- 资产金库页面 -->
<div class="page" id="page-assets" style="display:none;">
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span class="icon">📦</span> 资产金库 L2</div>
      <button class="btn btn-success" onclick="loadAssets()">🔄 刷新列表</button>
    </div>
    
    <div class="grid-2" style="margin-bottom:20px;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">资产类型筛选</label>
        <select class="form-select" id="asset-type-filter" onchange="loadAssets()">
          <option value="">全部类型</option>
          <option value="brand_appeal">品牌诉求</option>
          <option value="product_selling">产品卖点</option>
          <option value="user_scenario">用户场景</option>
          <option value="customer_case">客户案例</option>
          <option value="industry_knowledge">行业知识</option>
          <option value="visual_asset">视觉资产</option>
          <option value="qa_script">问答口径</option>
          <option value="risk_boundary">风险边界</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">关键词搜索</label>
        <input class="form-input" id="asset-keyword" type="text" placeholder="输入关键词搜索..." onkeyup="if(event.key==='Enter') loadAssets()" />
      </div>
    </div>
    
    <button class="btn btn-primary" onclick="loadAssets()">🔍 搜索资产</button>
    
    <div class="loading" id="assets-loading">
      <div class="spinner"></div>
      <div>正在加载资产列表...</div>
    </div>
    
    <div id="assets-list" style="margin-top:20px;"></div>
  </div>
</div>

<!-- 工作流页面 -->
<div class="page" id="page-workflow" style="display:none;">
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span class="icon">⚙️</span> 案例生成工作流 L3</div>
    </div>
    
    <div class="alert alert-warning">
      ⚠️ 工作流将调用 AI 生成营销文案，请确保 Ollama 已启动（或其他 LLM 配置）
    </div>
    
    <div class="form-group">
      <label class="form-label">原始素材 *</label>
      <textarea class="form-textarea" id="wf-raw" placeholder="输入品牌/产品原始素材，如：XX传媒社区媒体资源，覆盖70000+小区，开门App 600万+DAU"></textarea>
    </div>
    
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">客户名称 *</label>
        <input class="form-input" id="wf-client" type="text" placeholder="如：某日化品牌" />
      </div>
      <div class="form-group">
        <label class="form-label">行业（可选）</label>
        <input class="form-input" id="wf-industry" type="text" placeholder="如：日化、药店、家电" />
      </div>
    </div>
    
    <div class="form-group">
      <label class="form-label">产品信息（可选）</label>
      <textarea class="form-textarea" id="wf-product" placeholder="输入产品信息，如：新品洗发水社区推广"></textarea>
    </div>
    
    <button class="btn btn-primary" onclick="runWorkflow()">🚀 执行工作流</button>
    
    <div class="loading" id="wf-loading">
      <div class="spinner"></div>
      <div>正在执行工作流，请稍候...</div>
    </div>
    
    <div class="result-box" id="wf-result" style="display:none;">
      <div class="result-title">📊 工作流执行结果</div>
      <div id="wf-content"></div>
    </div>
  </div>
</div>

<script>
let currentPage = 'brand';

// 切换页面
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).style.display = 'block';
  event.target.classList.add('active');
  currentPage = page;
  
  if (page === 'assets') loadAssets();
}

// 加载品牌配置
async function loadBrandConfig() {
  const name = document.getElementById('brand-name').value.trim();
  if (!name) { alert('请输入品牌名称'); return; }
  
  document.getElementById('brand-loading').classList.add('show');
  document.getElementById('brand-result').style.display = 'none';
  
  try {
    const resp = await fetch(`/api/v2/bmn/brand/config?brand_name=${encodeURIComponent(name)}`);
    const data = await resp.json();
    
    let html = '';
    html += `<div style="margin-bottom:16px;"><strong>品牌名称：</strong>${data.brand_name || name}</div>`;
    html += `<div style="margin-bottom:16px;"><strong>品牌身份：</strong><div style="margin-top:8px; padding:12px; background:#fff; border-radius:6px;">${data.identity || '-'}</div></div>`;
    html += `<div style="margin-bottom:16px;"><strong>核心价值：</strong><div style="margin-top:8px; padding:12px; background:#fff; border-radius:6px;">${data.value_proposition || '-'}</div></div>`;
    html += `<div style="margin-bottom:16px;"><strong>差异化定位：</strong><div style="margin-top:8px; padding:12px; background:#fff; border-radius:6px;">${data.differentiation || '-'}</div></div>`;
    
    if (data.trust_proof && data.trust_proof.length > 0) {
      html += `<div style="margin-bottom:16px;"><strong>信任背书：</strong><div style="margin-top:8px;">`;
      data.trust_proof.forEach(p => html += `<div style="padding:8px 12px; background:#fff; border-radius:6px; margin-bottom:6px;">✅ ${p}</div>`);
      html += `</div></div>`;
    }
    
    document.getElementById('brand-content').innerHTML = html;
    document.getElementById('brand-result').style.display = 'block';
  } catch (e) {
    alert('加载失败：' + e.message);
  } finally {
    document.getElementById('brand-loading').classList.remove('show');
  }
}

// 加载资产列表
async function loadAssets() {
  const type = document.getElementById('asset-type-filter').value;
  const keyword = document.getElementById('asset-keyword').value.trim();
  
  document.getElementById('assets-loading').classList.add('show');
  document.getElementById('assets-list').innerHTML = '';
  
  try {
    let url = '/api/v2/bmn/assets?page=1&page_size=20';
    if (type) url += `&asset_type=${type}`;
    if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
    
    const resp = await fetch(url);
    const data = await resp.json();
    
    if (!data.items || data.items.length === 0) {
      document.getElementById('assets-list').innerHTML = '<div class="alert alert-warning">暂无资产数据</div>';
      return;
    }
    
    let html = '<table class="table"><thead><tr><th>标题</th><th>类型</th><th>标签</th><th>使用次数</th><th>来源</th></tr></thead><tbody>';
    data.items.forEach(item => {
      const typeMap = {
        'brand_appeal': '品牌诉求',
        'product_selling': '产品卖点',
        'user_scenario': '用户场景',
        'customer_case': '客户案例',
        'industry_knowledge': '行业知识',
        'visual_asset': '视觉资产',
        'qa_script': '问答口径',
        'risk_boundary': '风险边界'
      };
      html += `<tr>
        <td><strong>${item.title || '-'}</strong></td>
        <td><span class="tag">${typeMap[item.asset_type] || item.asset_type}</span></td>
        <td>${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</td>
        <td>${item.usage_count || 0}</td>
        <td style="color:var(--text-secondary); font-size:12px;">${item.source || '-'}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    html += `<div style="margin-top:12px; color:var(--text-secondary); font-size:13px;">共 ${data.total} 条资产</div>`;
    
    document.getElementById('assets-list').innerHTML = html;
  } catch (e) {
    document.getElementById('assets-list').innerHTML = `<div class="alert alert-danger">加载失败：${e.message}</div>`;
  } finally {
    document.getElementById('assets-loading').classList.remove('show');
  }
}

// 执行工作流
async function runWorkflow() {
  const raw = document.getElementById('wf-raw').value.trim();
  const client = document.getElementById('wf-client').value.trim();
  if (!raw || !client) { alert('请填写必填项（原始素材、客户名称）'); return; }
  
  document.getElementById('wf-loading').classList.add('show');
  document.getElementById('wf-result').style.display = 'none';
  
  try {
    const payload = {
      raw_material: raw,
      client_name: client,
      industry: document.getElementById('wf-industry').value.trim(),
      product_info: document.getElementById('wf-product').value.trim()
    };
    
    const resp = await fetch('/api/v2/bmn/workflows/case_study/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    
    const data = await resp.json();
    
    if (!data.ok) {
      throw new Error(data.detail || '工作流执行失败');
    }
    
    let html = '';
    html += `<div style="margin-bottom:20px;"><strong>工作流 ID：</strong><code style="background:var(--bg); padding:4px 8px; border-radius:4px;">${data.workflow_run_id || '-'}</code></div>`;
    
    if (data.result && data.result.copies) {
      html += `<div style="margin-bottom:20px;"><div style="font-weight:600; margin-bottom:12px; color:var(--primary);">📝 生成的文案：</div>`;
      html += `<div style="margin-bottom:16px;"><strong>小红书文案：</strong><div style="margin-top:8px; padding:12px; background:#fff; border-radius:6px; white-space:pre-wrap;">${data.result.copies.xhs || '-'}</div></div>`;
      html += `<div style="margin-bottom:16px;"><strong>朋友圈文案：</strong><div style="margin-top:8px; padding:12px; background:#fff; border-radius:6px; white-space:pre-wrap;">${data.result.copies.moments || '-'}</div></div>`;
      html += `<div style="margin-bottom:16px;"><strong>PPT 大纲：</strong><div style="margin-top:8px; padding:12px; background:#fff; border-radius:6px; white-space:pre-wrap;">${data.result.copies.ppt_outline || '-'}</div></div>`;
      html += `</div>`;
    }
    
    if (data.compliance && data.compliance.length > 0) {
      html += `<div style="margin-bottom:20px;"><div style="font-weight:600; margin-bottom:12px; color:var(--warning);">⚠️ 合规检查结果：</div>`;
      data.compliance.forEach(c => {
        html += `<div style="padding:8px 12px; background:#FDF6EC; border-radius:6px; margin-bottom:6px; font-size:13px;">${c}</div>`;
      });
      html += `</div>`;
    }
    
    if (data.result && data.result.asset_saved) {
      html += `<div class="alert alert-success">✅ 生成的文案已保存到资产金库（资产 ID：${data.result.asset_id || '-'}）</div>`;
    }
    
    document.getElementById('wf-content').innerHTML = html;
    document.getElementById('wf-result').style.display = 'block';
  } catch (e) {
    document.getElementById('wf-content').innerHTML = `<div class="alert alert-danger">❌ 执行失败：${e.message}</div>`;
    document.getElementById('wf-result').style.display = 'block';
  } finally {
    document.getElementById('wf-loading').classList.remove('show');
  }
}

// 页面加载时自动加载品牌配置
window.onload = function() {
  loadBrandConfig();
};
</script>

</body>
</html>
